name: splitly
description: A Very Good Project created by Very Good CLI.
version: 1.0.0+1
publish_to: none

environment:
  sdk: ^3.5.0

dependencies:
  bloc: ^9.0.0
  collection: ^1.19.0
  core:
    path: ./packages/core
  equatable: ^2.0.7
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.0
  flutter_dotenv: ^5.2.1
  flutter_localizations:
    sdk: flutter
  gap: ^3.0.1
  go_router: ^15.0.0
  google_generative_ai: ^0.4.6
  intl: ^0.19.0
  meta: ^1.15.0
  sizer: ^3.0.5

dev_dependencies:
  bloc_test: ^10.0.0
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.4
  very_good_analysis: ^7.0.0

flutter:
  uses-material-design: true
  generate: true

  fonts: 
    - family: Quicksand
      fonts:
        - asset: assets/font/Quicksand-Light.ttf
          weight: 300
        - asset: assets/font/Quicksand-Regular.ttf
          weight: 400
        - asset: assets/font/Quicksand-Medium.ttf
          weight: 500
        - asset: assets/font/Quicksand-SemiBold.ttf
          weight: 600
        - asset: assets/font/Quicksand-Bold.ttf
          weight: 700

  assets:
    - .env
    - assets/
